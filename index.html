<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Log</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1" id="theme-color-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garage Log">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Rajdhani','Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center}
  #app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;position:relative}
  input,select,textarea,button{font-family:inherit}
  input[type=date]::-webkit-calendar-picker-indicator{opacity:.5}
  select option{background:#1a1a2e;color:#f0f0f0}
  .slide-up{animation:slideUp .25s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Icons ─────────────────────────────────────────────────────────────────────
const ICONS = {
  wrench:`<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  bolt:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  drop:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`,
  car:   `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  home:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  plus:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  list:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  chart: `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>`,
  gear:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  folder:`<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  dollar:`<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
  ruler: `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M21.3 8.7L8.7 21.3c-.39.39-1.02.39-1.41 0l-4.6-4.6a1 1 0 0 1 0-1.41L15.3 2.7c.39-.39 1.02-.39 1.41 0l4.6 4.6c.38.38.38 1.02-.01 1.4z"/><line x1="7.49" y1="12.51" x2="11.99" y2="8.01"/><line x1="11.5" y1="16.5" x2="15.99" y2="12.01"/></svg>`,
  info:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><polyline points="20 6 9 17 4 12"/></svg>`,
  moon:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  sun:   `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
  edit:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash: `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  xmark: `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  down:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  chev:  `<svg viewBox="0 0 24 24" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="SIZE"><polyline points="6 9 12 15 18 9"/></svg>`,
};
function ic(name, sz=20, color='currentColor', extra='') {
  const s = `width:${sz}px;height:${sz}px;display:inline-block;flex-shrink:0;vertical-align:middle;${extra}`;
  return (ICONS[name]||'').replace('COLOR', color).replace('SIZE', s);
}

// ── Theme ─────────────────────────────────────────────────────────────────────
const ACCENTS = {
  indigo: {name:'Indigo',  accent:'#6366f1', aRgb:'99,102,241' },
  crimson:{name:'Crimson', accent:'#dc2626', aRgb:'220,38,38'  },
  emerald:{name:'Emerald', accent:'#10b981', aRgb:'16,185,129' },
  amber:  {name:'Amber',   accent:'#f59e0b', aRgb:'245,158,11' },
  rose:   {name:'Rose',    accent:'#ec4899', aRgb:'236,72,153' },
  slate:  {name:'Slate',   accent:'#64748b', aRgb:'100,116,139'},
};
function mkT(id, dark) {
  const a = ACCENTS[id] || ACCENTS.indigo;
  return dark ? {...a, dark,
    bg:'#0a0a12', surf:'#0e0e1c', card:'#111124', bdr:'#1e1e36',
    inp:'#181828', iBdr:'#28284a',
    t1:'#f0f0f8', t2:'#8888aa', t3:'#55556a', t4:'#2a2a40',
    nav:'rgba(10,10,20,.88)', cs:'dark',
  } : {...a, dark,
    bg:'#f1f1f9', surf:'#e8e8f2', card:'#ffffff', bdr:'#d4d4e8',
    inp:'#f5f5fd', iBdr:'#c8c8de',
    t1:'#1a1a2e', t2:'#55556e', t3:'#9090a8', t4:'#d0d0e4',
    nav:'rgba(238,238,248,.90)', cs:'light',
  };
}

// ── State ─────────────────────────────────────────────────────────────────────
const JT = [
  {id:'maintenance', label:'Maintenance', color:'#3B82F6', icon:'wrench'},
  {id:'upgrade',     label:'Upgrade',     color:'#F59E0B', icon:'bolt'  },
  {id:'consumable',  label:'Consumable',  color:'#10B981', icon:'drop'  },
];
const DEF_CATS = ['Engine','Suspension','Brakes','Transmission','Electrical','Body','Interior','Tires','Exhaust','Cooling','Other'];

let S = {
  view: 'log',
  tid: 'indigo',
  dark: true,
  cars: [],
  cats: [...DEF_CATS],
  recs: [],
  // forms
  form: {car:'',date:tod(),mileage:'',types:[],cat:'',cost:'',notes:''},
  fErr: '', fOk: false,
  carForm: {name:'',price:'',date:''},
  carOpen: false, carErr: '',
  newCat: '', catErr: '',
  // filters
  fCar:'all', fType:'all', fCat:'all',
  aCar:'all', dFrom:'', dTo:'',
  // edit/delete
  editRec: null,
  delId: null,
  editOpen: false,
};

function tod(){ return new Date().toISOString().split('T')[0]; }
function f$(n){ return n===0?'$0':`$${Number(n).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:2})}`; }
function fDate(d){ return d?new Date(d+'T00:00:00').toLocaleDateString('en',{year:'numeric',month:'short',day:'numeric'}):'—'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dim(a){ const T=mkT(S.tid,S.dark); return `rgba(${T.aRgb},${a})`; }

// ── Storage ───────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('gl_cars', JSON.stringify(S.cars));
  localStorage.setItem('gl_recs', JSON.stringify(S.recs));
  localStorage.setItem('gl_cats', JSON.stringify(S.cats));
  localStorage.setItem('gl_tid',  S.tid);
  localStorage.setItem('gl_dark', JSON.stringify(S.dark));
}
function load() {
  try { const v=localStorage.getItem('gl_cars'); if(v) S.cars=JSON.parse(v); } catch{}
  try { const v=localStorage.getItem('gl_recs'); if(v) S.recs=JSON.parse(v); } catch{}
  try { const v=localStorage.getItem('gl_cats'); if(v) S.cats=JSON.parse(v); } catch{}
  try { const v=localStorage.getItem('gl_tid');  if(v&&ACCENTS[v]) S.tid=v; } catch{}
  try { const v=localStorage.getItem('gl_dark'); if(v!==null) S.dark=JSON.parse(v); } catch{}
}

// ── Computed ──────────────────────────────────────────────────────────────────
function getFiltered() {
  return S.recs
    .filter(r=> S.fCar==='all' || r.car===S.fCar)
    .filter(r=> S.fType==='all' || r.types.includes(S.fType))
    .filter(r=> S.fCat==='all' || r.cat===S.fCat)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}
function getARecs() {
  return S.recs
    .filter(r=> S.aCar==='all' || r.car===S.aCar)
    .filter(r=> !S.dFrom || r.date>=S.dFrom)
    .filter(r=> !S.dTo   || r.date<=S.dTo);
}
function totalAll(){ return S.recs.reduce((s,r)=>s+(r.cost||0),0); }

// ── Chart helpers ─────────────────────────────────────────────────────────────
function sparklineHTML(data, color) {
  if(!data.length) return '';
  const max = Math.max(...data.map(d=>d.v), 1);
  const W=300, H=60, p=6;
  const pts = data.map((d,i)=>{
    const x = p+(i/Math.max(data.length-1,1))*(W-p*2);
    const y = H-p-((d.v/max)*(H-p*2));
    return `${x},${y}`;
  }).join(' ');
  const labels = data.map(d=>`<span style="color:#777;font-size:12px">${esc(d.k)}</span>`).join('');
  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <polyline points="${pts} ${W-p},${H} ${p},${H}" fill="url(#sg)" stroke="none"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${data.map((d,i)=>{
        if(!d.v) return '';
        const x=p+(i/Math.max(data.length-1,1))*(W-p*2);
        const y=H-p-((d.v/max)*(H-p*2));
        return `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}"/>`;
      }).join('')}
    </svg>
    <div style="display:flex;justify-content:space-between;margin-top:4px">${labels}</div>`;
}

function donutHTML(slices, total) {
  const R=36, C=2*Math.PI*R; let off=0;
  const segs = slices.map(s=>{
    const dash=(s.value/total)*C;
    const seg={...s,dash,off};
    off+=dash; return seg;
  });
  return `<div style="position:relative;width:100px;height:100px;flex-shrink:0">
    <svg viewBox="0 0 100 100" style="width:100px;height:100px;transform:rotate(-90deg)">
      <circle cx="50" cy="50" r="${R}" fill="none" stroke="#1a1a2e" stroke-width="14"/>
      ${segs.map(s=>`<circle cx="50" cy="50" r="${R}" fill="none" stroke="${s.color}" stroke-width="14" stroke-dasharray="${s.dash} ${C-s.dash}" stroke-dashoffset="${-s.off}"/>`).join('')}
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#f0f0f0;text-align:center">${f$(total)}</div>
  </div>`;
}

function barHTML(label, iconName, value, max, color, sub, T) {
  const pct = max>0?(value/max)*100:0;
  return `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:15px;margin-bottom:5px">
      <span style="color:${T.t2};display:flex;align-items:center;gap:6px">${iconName?ic(iconName,13,color):''}${esc(label)}</span>
      <span style="color:${color};font-weight:700">${f$(value)}${sub?`<span style="color:${T.t3};font-weight:400"> · ${esc(sub)}</span>`:''}</span>
    </div>
    <div style="background:${T.inp};border-radius:4px;height:7px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;transition:width .6s ease"></div>
    </div>
  </div>`;
}

function tagHTML(type) {
  const o = JT.find(j=>j.id===type);
  if(!o) return '';
  return `<span style="padding:2px 9px;border-radius:20px;font-size:13px;font-weight:700;background:${o.color}25;color:${o.color};letter-spacing:.5px;display:inline-flex;align-items:center;gap:4px">${ic(o.icon,10,o.color)}${o.label}</span>`;
}
function catTagHTML(cat) {
  if(!cat) return '';
  return `<span style="padding:2px 9px;border-radius:20px;font-size:13px;font-weight:700;background:rgba(168,85,247,.15);color:#a855f7;letter-spacing:.5px;display:inline-flex;align-items:center;gap:4px">${ic('folder',10,'#a855f7')}${esc(cat)}</span>`;
}
function sh(text, mt=28, T) {
  return `<div style="font-size:13px;color:${T.t3};letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:12px;margin-top:${mt}px">${text}</div>`;
}
function card(content, T) {
  return `<div style="background:${T.card};border:1px solid ${T.bdr};border-radius:14px;padding:16px;margin-bottom:16px">${content}</div>`;
}
function IS_style(T) {
  return `width:100%;padding:13px 16px;background:${T.inp};border:1px solid ${T.iBdr};border-radius:10px;color:${T.t1};font-size:17px;box-sizing:border-box;outline:none;font-family:inherit`;
}
function IS_sm(T) {
  return `width:100%;padding:9px 12px;background:${T.inp};border:1px solid ${T.iBdr};border-radius:10px;color:${T.t1};font-size:15px;box-sizing:border-box;outline:none;font-family:inherit`;
}
function LS_style(T) {
  return `color:${T.t2};font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block`;
}
function field(label, input, T) {
  return `<div style="margin-bottom:18px"><label style="${LS_style(T)}">${label}</label>${input}</div>`;
}

// ── Views ─────────────────────────────────────────────────────────────────────
function viewAdd(T) {
  const carOpts = S.cars.map(c=>`<option value="${esc(c.name)}" ${S.form.car===c.name?'selected':''}>${esc(c.name)}</option>`).join('');
  const catOpts = S.cats.map(c=>`<option value="${esc(c)}" ${S.form.cat===c?'selected':''}>${esc(c)}</option>`).join('');
  const IS = IS_style(T);
  const typeChecks = JT.map(j=>`
    <label style="display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;background:${S.form.types.includes(j.id)?`rgba(${T.aRgb},.12)`:'transparent'}">
      <input type="checkbox" data-typeid="${j.id}" ${S.form.types.includes(j.id)?'checked':''} onchange="toggleType('${j.id}')" style="accent-color:${j.color};width:16px;height:16px">
      ${ic(j.icon,16,j.color)}
      <span style="color:${T.t1};font-size:17px">${j.label}</span>
      <span style="margin-left:auto;width:8px;height:8px;border-radius:50%;background:${j.color}"></span>
    </label>`).join('');
  return `
    <div style="font-size:20px;font-weight:700;margin-bottom:24px;color:${T.accent};letter-spacing:1px">NEW ENTRY</div>
    ${field('Vehicle',`<select style="${IS};cursor:pointer" onchange="setFormField('car',this.value)">
      <option value="">Select a car…</option>${carOpts}</select>`,T)}
    ${S.cars.length===0?`<p style="color:${T.t3};font-size:15px;margin-top:-10px;margin-bottom:18px">No cars yet. <span style="color:${T.accent};cursor:pointer" onclick="nav('settings')">Add one in Settings →</span></p>`:''}
    ${field('Date',`<input type="date" value="${S.form.date}" onchange="setFormField('date',this.value)" style="${IS};color-scheme:${T.cs}">`,T)}
    ${field('Mileage (km)',`<input type="number" placeholder="e.g. 85000" value="${S.form.mileage}" oninput="setFormField('mileage',this.value)" style="${IS}">`,T)}
    ${field('Job Type',`<div style="background:${T.inp};border:1px solid ${T.iBdr};border-radius:10px;overflow:hidden">${typeChecks}</div>`,T)}
    ${field('Category',`<select style="${IS};cursor:pointer" onchange="setFormField('cat',this.value)">
      <option value="">Select a category…</option>${catOpts}</select>`,T)}
    ${field('Cost ($)',`<div style="position:relative"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:${T.t3};font-size:17px;font-weight:700;pointer-events:none">$</span><input type="number" min="0" step="0.01" placeholder="0.00" value="${S.form.cost}" oninput="setFormField('cost',this.value)" style="${IS};padding-left:30px"></div>`,T)}
    ${field('Notes',`<textarea placeholder="What was done?" oninput="setFormField('notes',this.value)" rows="4" style="${IS};resize:vertical">${esc(S.form.notes)}</textarea>`,T)}
    ${S.fErr?`<div style="color:#ef4444;font-size:15px;margin-bottom:16px;padding:10px 14px;background:rgba(239,68,68,.1);border-radius:8px">${esc(S.fErr)}</div>`:''}
    <button onclick="submitRec()" style="width:100%;padding:15px;background:${S.fOk?'#10B981':`linear-gradient(135deg,${T.accent},${T.accent}bb)`};border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .3s;font-family:inherit">
      ${S.fOk?'✓ SAVED!':'SAVE RECORD'}
    </button>`;
}

function viewHistory(T) {
  const filtered = getFiltered();
  const total = filtered.reduce((s,r)=>s+(r.cost||0),0);
  const IS = IS_sm(T);
  const carOpts = S.cars.map(c=>`<option value="${esc(c.name)}" ${S.fCar===c.name?'selected':''}>${esc(c.name)}</option>`).join('');
  const catOpts = S.cats.map(c=>`<option value="${esc(c)}" ${S.fCat===c?'selected':''}>${esc(c)}</option>`).join('');
  const typeOpts = JT.map(j=>`<option value="${j.id}" ${S.fType===j.id?'selected':''}>${j.label}</option>`).join('');

  const records = filtered.map(r=>{
    const barColor = r.types.length ? JT.find(j=>j.id===r.types[0])?.color||T.accent : T.accent;
    const delConf = S.delId===r.id ? `
      <div style="margin-top:12px;padding:12px;background:rgba(239,68,68,.1);border-radius:10px;border:1px solid rgba(239,68,68,.25)">
        <div style="font-size:15px;color:#f87171;margin-bottom:10px;font-weight:600">Delete this record?</div>
        <div style="display:flex;gap:8px">
          <button onclick="S.delId=null;render()" style="flex:1;padding:8px;background:none;border:1px solid ${T.bdr};border-radius:8px;color:${T.t2};cursor:pointer;font-family:inherit;font-weight:700;font-size:14px">Cancel</button>
          <button onclick="delRec('${r.id}')" style="flex:1;padding:8px;background:#ef4444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px">Delete</button>
        </div>
      </div>` : '';
    return `
      <div style="background:${T.card};border:1px solid ${T.bdr};border-radius:14px;padding:16px;position:relative;overflow:hidden">
        <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${barColor}"></div>
        <div style="padding-left:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div style="font-weight:700;font-size:18px;color:${T.t1}">${esc(r.car)}</div>
              <div style="color:${T.t3};font-size:14px">${esc(r.date)} · ${Number(r.mileage).toLocaleString()} km</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              ${r.cost>0?`<div style="font-size:18px;font-weight:700;color:#10B981">${f$(r.cost)}</div>`:''}
              <button onclick="openEdit('${r.id}')" style="background:none;border:none;color:${T.t3};cursor:pointer;padding:4px;display:flex;border-radius:6px">${ic('edit',15,T.t3)}</button>
              <button onclick="S.delId=S.delId==='${r.id}'?null:'${r.id}';render()" style="background:none;border:none;color:${T.t3};cursor:pointer;padding:4px;display:flex;border-radius:6px">${ic('trash',15,T.t3)}</button>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">${r.types.map(t=>tagHTML(t)).join('')}${catTagHTML(r.cat)}</div>
          ${r.notes?`<div style="color:${T.t2};font-size:15px;line-height:1.5;margin-top:10px">${esc(r.notes)}</div>`:''}
          ${delConf}
        </div>
      </div>`;
  }).join('');

  return `
    <div style="font-size:20px;font-weight:700;margin-bottom:16px;color:${T.accent};letter-spacing:1px">HISTORY</div>
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <select style="${IS};flex:1" onchange="S.fCar=this.value;render()"><option value="all">All Cars</option>${carOpts}</select>
      <select style="${IS};flex:1" onchange="S.fType=this.value;render()"><option value="all">All Types</option>${typeOpts}</select>
    </div>
    <select style="${IS};margin-bottom:12px" onchange="S.fCat=this.value;render()"><option value="all">All Categories</option>${catOpts}</select>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:14px;color:${T.t3}">${filtered.length} records · <span style="color:#10B981">${f$(total)}</span></span>
      ${filtered.length>0?`<button onclick="exportCSV()" style="display:flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(${T.aRgb},.1);border:1px solid rgba(${T.aRgb},.3);border-radius:20px;color:${T.accent};font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">${ic('down',13,T.accent)} Export CSV</button>`:''}
    </div>
    ${filtered.length===0
      ?`<div style="text-align:center;padding:60px 20px">${ic('list',40,T.t4,'display:block;margin:0 auto 12px')}<div style="color:${T.t3}">No records found.</div></div>`
      :`<div style="display:flex;flex-direction:column;gap:12px">${records}</div>`}`;
}

function viewAnalytics(T) {
  const aRecs = getARecs();
  const totalM = aRecs.reduce((s,r)=>s+(r.cost||0),0);
  const selCar = S.aCar!=='all' ? S.cars.find(c=>c.name===S.aCar) : null;
  const totalInv = (selCar?.price||0)+totalM;
  const sByType = JT.map(j=>({...j, value:aRecs.filter(r=>r.types.includes(j.id)).reduce((s,r)=>s+(r.cost||0),0), count:aRecs.filter(r=>r.types.includes(j.id)).length}));
  const sByCar = S.cars.map(c=>({label:c.name, price:c.price||0, maint:S.recs.filter(r=>r.car===c.name).reduce((s,r)=>s+(r.cost||0),0), count:S.recs.filter(r=>r.car===c.name).length})).map(c=>({...c,value:c.price+c.maint})).sort((a,b)=>b.value-a.value);
  const sByCat = S.cats.map(c=>({label:c, value:aRecs.filter(r=>r.cat===c).reduce((s,r)=>s+(r.cost||0),0), count:aRecs.filter(r=>r.cat===c).length})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  const now = new Date();
  const monthly = Array.from({length:7},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(6-i),1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return {k:d.toLocaleString('en',{month:'short'}), v:aRecs.filter(r=>r.date?.startsWith(key)).reduce((s,r)=>s+(r.cost||0),0)};
  });
  const maxC=Math.max(...sByCar.map(c=>c.value),1);
  const maxT=Math.max(...sByType.map(t=>t.value),1);
  const maxCat=Math.max(...sByCat.map(c=>c.value),1);
  const donut=sByType.filter(t=>t.value>0).map(t=>({color:t.color,value:t.value}));
  const rcWithCost=aRecs.filter(r=>r.cost>0);
  let kmCost=null;
  if(aRecs.length>=2){const sorted=[...aRecs].sort((a,b)=>a.mileage-b.mileage);const km=sorted[sorted.length-1].mileage-sorted[0].mileage;if(km>0)kmCost=(totalM/km).toFixed(2);}

  const IS=IS_sm(T);
  const carOpts=S.cars.map(c=>`<option value="${esc(c.name)}" ${S.aCar===c.name?'selected':''}>${esc(c.name)}</option>`).join('');

  return `
    <div style="font-size:20px;font-weight:700;margin-bottom:16px;color:${T.accent};letter-spacing:1px">ANALYTICS</div>
    <select style="${IS};margin-bottom:10px" onchange="S.aCar=this.value;render()"><option value="all">All Vehicles</option>${carOpts}</select>
    <div style="display:flex;gap:10px;margin-bottom:6px">
      <div style="flex:1"><div style="font-size:12px;color:${T.t3};font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">From</div>
        <input type="date" value="${S.dFrom}" onchange="S.dFrom=this.value;render()" style="${IS};color-scheme:${T.cs}"></div>
      <div style="flex:1"><div style="font-size:12px;color:${T.t3};font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">To</div>
        <input type="date" value="${S.dTo}" onchange="S.dTo=this.value;render()" style="${IS};color-scheme:${T.cs}"></div>
    </div>
    ${(S.dFrom||S.dTo)?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:14px;color:${T.t3}">${aRecs.length} records in range</span>
      <button onclick="S.dFrom='';S.dTo='';render()" style="background:none;border:none;color:${T.accent};font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;padding:0">Clear ×</button>
    </div>`:'<div style="margin-bottom:16px"></div>'}

    ${selCar?card(`
      <div style="display:flex;gap:16px;align-items:center">
        <div style="width:44px;height:44px;border-radius:12px;background:${dim(.15)};display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('car',24,T.accent)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:19px;color:${T.t1}">${esc(selCar.name)}</div>
          <div style="display:flex;gap:20px;margin-top:6px;flex-wrap:wrap">
            <div><div style="font-size:12px;color:${T.t3};text-transform:uppercase;letter-spacing:1px">Purchase Price</div><div style="font-size:18px;font-weight:700;color:#F59E0B">${selCar.price?f$(selCar.price):'—'}</div></div>
            <div><div style="font-size:12px;color:${T.t3};text-transform:uppercase;letter-spacing:1px">Purchase Date</div><div style="font-size:16px;font-weight:600;color:${T.t2}">${fDate(selCar.date)}</div></div>
            <div><div style="font-size:12px;color:${T.t3};text-transform:uppercase;letter-spacing:1px">Total Investment</div><div style="font-size:18px;font-weight:700;color:#ef4444">${f$(totalInv)}</div></div>
          </div>
        </div>
      </div>`,T):''}

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      ${[{label:'Maintenance',value:f$(totalM),icon:'dollar',color:'#10B981'},{label:'Records',value:aRecs.length,icon:'list',color:T.accent},{label:'Avg / Job',value:rcWithCost.length?f$(totalM/rcWithCost.length):'—',icon:'chart',color:'#F59E0B'}].map(s=>`
        <div style="background:${T.card};border:1px solid ${T.bdr};border-radius:14px;padding:14px 8px;text-align:center">
          ${ic(s.icon,20,s.color,'display:block;margin:0 auto')}
          <div style="font-size:17px;font-weight:700;color:${s.color};line-height:1.3;margin-top:6px">${s.value}</div>
          <div style="font-size:11px;color:${T.t3};letter-spacing:1px;text-transform:uppercase">${s.label}</div>
        </div>`).join('')}
    </div>

    ${kmCost?card(`<div style="display:flex;align-items:center;gap:14px">
      <div style="width:40px;height:40px;border-radius:10px;background:rgba(245,158,11,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('ruler',20,'#F59E0B')}</div>
      <div><div style="font-size:22px;font-weight:700;color:#F59E0B">$${kmCost} <span style="font-size:15px;color:${T.t3};font-weight:400">/ km</span></div>
      <div style="font-size:13px;color:${T.t3};text-transform:uppercase;letter-spacing:1px">Maintenance cost per kilometre</div></div>
    </div>`,T):''}

    ${aRecs.length>0?card(`${sh('Monthly Spend — Last 7 Months',0,T)}${sparklineHTML(monthly,T.accent)}`,T):''}

    ${card(`${sh('Maintenance vs Upgrade vs Consumable',0,T)}
      ${totalM>0&&donut.length>0?`<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        ${donutHTML(donut,totalM)}
        <div style="flex:1">${sByType.filter(t=>t.value>0).map(t=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
            <span style="font-size:15px;color:${T.t2};flex:1">${t.label}</span>
            <span style="font-size:15px;font-weight:700;color:${t.color}">${f$(t.value)}</span>
          </div>`).join('')}</div>
      </div>`:''}
      ${sByType.map(t=>barHTML(t.label,t.icon,t.value,maxT,t.color,`${t.count} records`,T)).join('')}`,T)}

    ${S.aCar==='all'&&sByCar.length>0?card(`${sh('Total Investment per Vehicle',0,T)}
      <div style="font-size:13px;color:${T.t3};margin-bottom:12px">Purchase price + maintenance costs</div>
      ${sByCar.map(c=>`<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:5px">
          <span style="color:${T.t2};display:flex;align-items:center;gap:6px">${ic('car',13,T.accent)}${esc(c.label)}</span>
          <span style="color:${T.accent};font-weight:700">${f$(c.value)} <span style="color:${T.t3};font-weight:400">· ${c.count}</span></span>
        </div>
        <div style="background:${T.inp};border-radius:4px;height:9px;overflow:hidden;display:flex">
          <div style="width:${(c.price/maxC)*100}%;background:#F59E0B;transition:width .6s"></div>
          <div style="width:${(c.maint/maxC)*100}%;background:${T.accent};transition:width .6s"></div>
        </div>
        <div style="display:flex;gap:14px;margin-top:5px;font-size:13px;color:${T.t3}">
          <span><span style="color:#F59E0B">■</span> Purchase ${f$(c.price)}</span>
          <span><span style="color:${T.accent}">■</span> Maintenance ${f$(c.maint)}</span>
        </div>
      </div>`).join('')}`,T):''}

    ${sByCat.length>0?card(`${sh('Expense by Category',0,T)}${sByCat.map(c=>barHTML(c.label,'folder',c.value,maxCat,'#a855f7',`${c.count} records`,T)).join('')}`,T):''}

    ${aRecs.length===0?`<div style="text-align:center;padding:60px 20px">${ic('chart',44,T.t4,'display:block;margin:0 auto 12px')}<div style="font-size:18px;color:${T.t3}">No data yet.</div><span style="color:${T.accent};cursor:pointer;font-size:15px" onclick="nav('add')">Log your first entry →</span></div>`:''}`;
}

      ${S.cats.map(c=>`
        <div style="display:flex;align-items:center;justify-content:space-between;background:${T.card};border:1px solid ${T.bdr};border-radius:10px;padding:13px 16px">
          <div style="display:flex;align-items:center;gap:10px">${ic('folder',16,'#a855f7')}<span style="font-weight:600;color:${T.t1}">${esc(c)}</span></div>
          <button onclick="deleteCat('${esc(c)}')" style="background:none;border:none;color:${T.t3};cursor:pointer;padding:4px;display:flex">${ic('xmark',16,T.t3)}</button>
        </div>`).join('')}
      ${S.cats.length===0?`<div style="color:${T.t3};text-align:center;padding:16px;font-size:16px">No categories yet.</div>`:''}
    </div>

    <div style="margin-top:32px;padding:16px;background:${T.card};border-radius:12px;border:1px solid ${T.bdr}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${ic('info',14,T.t3)}<div style="font-size:13px;color:${T.t3};letter-spacing:1px;font-weight:700;text-transform:uppercase">About</div></div>
      <div style="color:${T.t2};font-size:15px;line-height:1.6">Garage Log saves all data locally in your browser.</div>
      <div style="margin-top:10px;color:${T.t3};font-size:14px">${S.recs.length} records · ${S.cars.length} vehicles · ${f$(totalAll())} maintenance spent</div>
    </div>`;
}

function viewDashboard(T) {
  const IS = IS_sm(T);
  const recentRecs = [...S.recs].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);
  return `
    <div style="font-size:20px;font-weight:700;margin-bottom:20px;color:${T.accent};letter-spacing:1px">DASHBOARD</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
      ${[{label:'Records',value:S.recs.length,icon:'list',color:T.accent},{label:'Vehicles',value:S.cars.length,icon:'car',color:T.accent},{label:'Spent',value:f$(totalAll()),icon:'dollar',color:'#10B981'}].map(s=>`
        <div style="background:${T.card};border:1px solid ${T.bdr};border-radius:14px;padding:14px 8px;text-align:center">
          ${ic(s.icon,20,s.color,'display:block;margin:0 auto')}
          <div style="font-size:18px;font-weight:700;color:${s.color};line-height:1.3;margin-top:6px">${s.value}</div>
          <div style="font-size:11px;color:${T.t3};letter-spacing:1px;text-transform:uppercase">${s.label}</div>
        </div>`).join('')}
    </div>

    ${card(`${sh('Spend by Type',0,T)}
      ${JT.map(j=>{
        const val=S.recs.filter(r=>r.types.includes(j.id)).reduce((s,r)=>s+(r.cost||0),0);
        const mx=Math.max(...JT.map(jj=>S.recs.filter(r=>r.types.includes(jj.id)).reduce((s,r)=>s+(r.cost||0),0)),1);
        return barHTML(j.label,j.icon,val,mx,j.color,'',T);
      }).join('')}
      <div style="text-align:right;margin-top:4px"><span style="color:${T.accent};font-size:14px;cursor:pointer" onclick="nav('analytics')">Full analytics →</span></div>`,T)}

    ${S.cars.length>0?card(`${sh('My Fleet',0,T)}
      ${S.cars.map(c=>{
        const maint=S.recs.filter(r=>r.car===c.name).reduce((s,r)=>s+(r.cost||0),0);
        return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid ${T.bdr}">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;border-radius:8px;background:${dim(.12)};display:flex;align-items:center;justify-content:center">${ic('car',17,T.accent)}</div>
            <div><div style="font-weight:700;font-size:16px;color:${T.t1}">${esc(c.name)}</div>${c.date?`<div style="font-size:13px;color:${T.t3}">Bought ${fDate(c.date)}</div>`:''}</div>
          </div>
          <div style="text-align:right">${c.price>0?`<div style="font-size:15px;color:#F59E0B;font-weight:700">${f$(c.price)}</div>`:''}<div style="font-size:13px;color:${T.t3}">${f$(maint)} maint.</div></div>
        </div>`;}).join('')}`,T):''}

    ${sh('Recent Entries',0,T)}
    ${S.recs.length===0
      ?`<div style="text-align:center;padding:30px 20px">${ic('wrench',36,T.t4,'display:block;margin:0 auto 12px')}<div style="color:${T.t3};font-size:16px">No records yet.</div><span style="color:${T.accent};cursor:pointer;font-size:15px" onclick="nav('add')">Log your first entry →</span></div>`
      :`<div style="display:flex;flex-direction:column;gap:10px">
        ${recentRecs.map(r=>`
          <div style="background:${T.card};border:1px solid ${T.bdr};border-radius:12px;padding:14px 16px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div><div style="font-weight:700;font-size:16px;color:${T.t1}">${esc(r.car)}</div><div style="color:${T.t3};font-size:14px">${esc(r.date)} · ${Number(r.mileage).toLocaleString()} km</div></div>
              ${r.cost>0?`<div style="font-size:17px;font-weight:700;color:#10B981">${f$(r.cost)}</div>`:''}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${r.types.map(t=>tagHTML(t)).join('')}${catTagHTML(r.cat)}</div>
          </div>`).join('')}
        ${S.recs.length>4?`<button onclick="nav('history')" style="background:none;border:1px solid ${T.bdr};border-radius:10px;color:${T.accent};padding:12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px">View all ${S.recs.length} records →</button>`:''}
      </div>`}`;
}

function editModal(T) {
  if(!S.editRec) return '';
  const r = S.editRec;
  const IS = IS_style(T);
  const carOpts = S.cars.map(c=>`<option value="${esc(c.name)}" ${r.car===c.name?'selected':''}>${esc(c.name)}</option>`).join('');
  const catOpts = S.cats.map(c=>`<option value="${esc(c)}" ${r.cat===c?'selected':''}>${esc(c)}</option>`).join('');
  const typeChecks = JT.map(j=>`
    <label style="display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;background:${r.types.includes(j.id)?`rgba(${T.aRgb},.12)`:'transparent'}">
      <input type="checkbox" ${r.types.includes(j.id)?'checked':''} onchange="toggleEditType('${j.id}')" style="accent-color:${j.color};width:16px;height:16px">
      ${ic(j.icon,16,j.color)}
      <span style="color:${T.t1};font-size:17px">${j.label}</span>
    </label>`).join('');
  return `
    <div onclick="if(event.target===this){S.editRec=null;render()}" style="position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)">
      <div style="background:${T.surf};border:1px solid ${T.bdr};border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-sizing:border-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <div style="font-size:18px;font-weight:700;color:${T.accent};letter-spacing:1px">EDIT RECORD</div>
          <button onclick="S.editRec=null;render()" style="background:none;border:none;color:${T.t2};cursor:pointer;padding:4px;display:flex">${ic('xmark',18,T.t2)}</button>
        </div>
        <div style="margin-bottom:14px"><label style="${LS_style(T)}">Vehicle</label><select style="${IS};cursor:pointer" onchange="S.editRec.car=this.value"><option value="">Select…</option>${carOpts}</select></div>
        <div style="margin-bottom:14px"><label style="${LS_style(T)}">Date</label><input type="date" value="${r.date}" onchange="S.editRec.date=this.value" style="${IS};color-scheme:${T.cs}"></div>
        <div style="margin-bottom:14px"><label style="${LS_style(T)}">Mileage (km)</label><input type="number" value="${r.mileage}" oninput="S.editRec.mileage=this.value" style="${IS}"></div>
        <div style="margin-bottom:14px"><label style="${LS_style(T)}">Job Type</label><div style="background:${T.inp};border:1px solid ${T.iBdr};border-radius:10px;overflow:hidden">${typeChecks}</div></div>
        <div style="margin-bottom:14px"><label style="${LS_style(T)}">Category</label><select style="${IS};cursor:pointer" onchange="S.editRec.cat=this.value"><option value="">No category</option>${catOpts}</select></div>
        <div style="margin-bottom:14px"><label style="${LS_style(T)}">Cost ($)</label><div style="position:relative"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:${T.t3};font-size:17px;font-weight:700;pointer-events:none">$</span><input type="number" min="0" step="0.01" value="${r.cost}" oninput="S.editRec.cost=this.value" style="${IS};padding-left:30px"></div></div>
        <div style="margin-bottom:20px"><label style="${LS_style(T)}">Notes</label><textarea oninput="S.editRec.notes=this.value" rows="3" style="${IS};resize:vertical">${esc(r.notes||'')}</textarea></div>
        <div style="display:flex;gap:10px">
          <button onclick="S.editRec=null;render()" style="flex:1;padding:13px;background:none;border:1px solid ${T.bdr};border-radius:12px;color:${T.t2};cursor:pointer;font-family:inherit;font-weight:700">Cancel</button>
          <button onclick="saveEdit()" style="flex:2;padding:13px;background:linear-gradient(135deg,${T.accent},${T.accent}bb);border:none;border-radius:12px;color:#fff;cursor:pointer;font-family:inherit;font-weight:700;font-size:17px">Save Changes</button>
        </div>
      </div>
    </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const T = mkT(S.tid, S.dark);
  const NAV = [
    {id:'log',     icon:'home',  label:'Home'   },
    {id:'add',     icon:'plus',  label:'Add'    },
    {id:'history', icon:'list',  label:'History'},
    {id:'analytics',icon:'chart',label:'Stats'  },
    {id:'settings',icon:'gear',  label:'Settings'},
  ];

  const viewContent = {
    log:       viewDashboard(T),
    add:       viewAdd(T),
    history:   viewHistory(T),
    analytics: viewAnalytics(T),
    settings:  viewSettings(T),
  }[S.view] || '';

  const navHTML = NAV.map(n=>{
    const active = S.view===n.id;
    return `<button onclick="nav('${n.id}')" style="display:flex;align-items:center;gap:${active?7:0}px;padding:${active?'8px 16px':'8px 12px'};border-radius:100px;background:${active?T.accent:'transparent'};border:none;cursor:pointer;transition:all .25s;font-family:inherit;overflow:hidden;white-space:nowrap">
      ${ic(n.icon,18,active?'#fff':T.t3)}
      ${active?`<span style="font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff">${n.label}</span>`:''}
    </button>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div style="background:${T.bg};color:${T.t1};min-height:100vh;display:flex;flex-direction:column;transition:background .25s,color .25s">
      <!-- Header -->
      <div style="padding:18px 20px 14px;border-bottom:1px solid ${T.bdr};background:linear-gradient(180deg,${T.surf},${T.bg});position:sticky;top:0;z-index:10">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;border-radius:10px;background:${dim(.18)};display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('car',20,T.accent)}</div>
          <div>
            <div style="font-size:24px;font-weight:700;letter-spacing:1px;line-height:1;color:${T.t1}">GARAGE LOG</div>
            <div style="font-size:13px;color:${T.t3};letter-spacing:2px">VEHICLE MAINTENANCE TRACKER</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:17px;color:#10B981;font-weight:700">${f$(totalAll())}</div>
            <div style="font-size:11px;color:${T.t3};letter-spacing:1px;text-transform:uppercase">Maintenance Spent</div>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div style="flex:1;padding:20px;padding-bottom:100px;overflow-y:auto" class="slide-up">
        ${viewContent}
      </div>

      <!-- Pill Nav -->
      <div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:2px;background:${T.nav};backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(${T.aRgb},.2);border-radius:100px;padding:6px 8px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
        ${navHTML}
      </div>

      <!-- Edit Modal -->
      ${editModal(T)}
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function nav(v){ S.view=v; S.delId=null; render(); }

function setFormField(k,v){ S.form[k]=v; }

function toggleType(id) {
  if(S.form.types.includes(id)) S.form.types=S.form.types.filter(t=>t!==id);
  else S.form.types=[...S.form.types,id];
  render();
}
function toggleEditType(id) {
  if(!S.editRec) return;
  if(S.editRec.types.includes(id)) S.editRec.types=S.editRec.types.filter(t=>t!==id);
  else S.editRec.types=[...S.editRec.types,id];
  render();
}

function submitRec() {
  if(!S.form.car) return setErr('Please select a car.');
  if(!S.form.date) return setErr('Please enter a date.');
  if(!S.form.mileage||isNaN(S.form.mileage)) return setErr('Enter a valid mileage.');
  if(!S.form.types.length) return setErr('Select at least one job type.');
  S.fErr='';
  S.recs=[{id:Date.now(),...S.form,mileage:Number(S.form.mileage),cost:S.form.cost?Number(S.form.cost):0},...S.recs];
  const lastCar=S.form.car;
  S.form={car:lastCar,date:tod(),mileage:'',types:[],cat:'',cost:'',notes:''};
  S.fOk=true; save(); render();
  setTimeout(()=>{S.fOk=false;S.view='history';render();},900);
}
function setErr(msg){ S.fErr=msg; render(); }

function addCar() {
  const nm=S.carForm.name.trim();
  if(!nm){ S.carErr='Enter a vehicle name.'; render(); return; }
  if(S.cars.find(c=>c.name===nm)){ S.carErr='Already exists.'; render(); return; }
  S.cars=[...S.cars,{id:Date.now(),name:nm,price:S.carForm.price?Number(S.carForm.price):0,date:S.carForm.date||''}];
  S.carForm={name:'',price:'',date:''}; S.carOpen=false; S.carErr='';
  save(); render();
}
function deleteCar(id){ S.cars=S.cars.filter(c=>String(c.id)!==String(id)); save(); render(); }
function addCat() {
  const n=S.newCat.trim();
  if(!n){ S.catErr='Enter a name.'; render(); return; }
  if(S.cats.includes(n)){ S.catErr='Already exists.'; render(); return; }
  S.cats=[...S.cats,n]; S.newCat=''; S.catErr=''; save(); render();
}
function deleteCat(name){ S.cats=S.cats.filter(c=>c!==name); save(); render(); }

function openEdit(id) {
  const r=S.recs.find(r=>String(r.id)===String(id));
  if(!r) return;
  S.editRec={...r,mileage:String(r.mileage),cost:r.cost?String(r.cost):''};
  render();
}
function saveEdit() {
  if(!S.editRec) return;
  S.recs=S.recs.map(r=>r.id===S.editRec.id?{...S.editRec,mileage:Number(S.editRec.mileage),cost:S.editRec.cost?Number(S.editRec.cost):0}:r);
  S.editRec=null; save(); render();
}
function delRec(id) {
  S.recs=S.recs.filter(r=>String(r.id)!==String(id));
  S.delId=null; save(); render();
}

function exportCSV() {
  const rows=getFiltered();
  const hdr=['Date','Car','Mileage','Types','Category','Cost','Notes'];
  const lines=rows.map(r=>[r.date,r.car,r.mileage,(r.types||[]).join('|'),r.cat||'',r.cost||0,(r.notes||'').replace(/"/g,'""')].map(v=>`"${v}"`).join(','));
  const blob=new Blob([[hdr.join(','),...lines].join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='garage-log.csv';a.click();URL.revokeObjectURL(url);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
load();
render();

// ── PWA Install ───────────────────────────────────────────────────────────────
let deferredPrompt = null;
let isInstalled = window.matchMedia('(display-mode: standalone)').matches
                  || window.navigator.standalone === true;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  renderInstallBanner();
});

window.addEventListener('appinstalled', () => {
  isInstalled = true;
  deferredPrompt = null;
  const b = document.getElementById('install-banner');
  if (b) b.remove();
});

function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}

function renderInstallBanner() {
  const old = document.getElementById('install-banner');
  if (old) old.remove();
  if (isInstalled) return;
  const T = mkT(S.tid, S.dark);
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  if (isIOS()) {
    banner.innerHTML = `
      <div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:${T.card};border:1px solid ${T.bdr};border-radius:16px;padding:14px 16px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:12px">
        <div style="font-size:26px;flex-shrink:0">📲</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:16px;color:${T.t1};margin-bottom:2px">Install Garage Log</div>
          <div style="font-size:14px;color:${T.t2}">Tap <strong>Share</strong> ⎙ then <strong>"Add to Home Screen"</strong></div>
        </div>
        <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:${T.t3};cursor:pointer;font-size:22px;padding:0;line-height:1;flex-shrink:0">×</button>
      </div>`;
  } else if (deferredPrompt) {
    banner.innerHTML = `
      <div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:${T.card};border:1px solid ${T.bdr};border-radius:16px;padding:14px 16px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:10px;background:rgba(${T.aRgb},.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('car',22,T.accent)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:16px;color:${T.t1};margin-bottom:2px">Install Garage Log</div>
          <div style="font-size:14px;color:${T.t2}">Add to your home screen for quick access</div>
        </div>
        <button onclick="triggerInstall()" style="padding:8px 14px;background:${T.accent};border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;flex-shrink:0">Install</button>
        <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:${T.t3};cursor:pointer;font-size:22px;padding:0 0 0 4px;line-height:1;flex-shrink:0">×</button>
      </div>`;
  }
  if (banner.innerHTML) document.body.appendChild(banner);
}

function triggerInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.remove();
    if (choice.outcome === 'accepted') isInstalled = true;
  });
}

if ('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => {
        console.log('SW registered:', reg.scope);
        if (isIOS() && !isInstalled) setTimeout(renderInstallBanner, 2000);
      })
      .catch(err => console.log('SW error:', err));
  });
} else if (isIOS() && !isInstalled) {
  // Still show iOS install banner even without SW (e.g. in preview)
  setTimeout(renderInstallBanner, 2000);
}

</script>
